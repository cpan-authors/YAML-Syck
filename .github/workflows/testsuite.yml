name: testsuite

on:
  push:
    branches:
      - "*"
    tags-ignore:
      - "*"
  pull_request:

jobs:
  ubuntu:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install cpm
        run: sudo curl -fsSL --compressed https://raw.githubusercontent.com/skaji/cpm/main/cpm -o /usr/local/bin/cpm && sudo chmod 755 /usr/local/bin/cpm
      - name: Install Dependencies
        run: sudo perl /usr/local/bin/cpm install -g --show-build-log-on-failure --no-test --cpanfile cpanfile
      - name: Makefile.PL
        run: perl -I$(pwd) Makefile.PL
      - name: make test
        run: make test

  disttest:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install cpm
        run: sudo curl -fsSL --compressed https://raw.githubusercontent.com/skaji/cpm/main/cpm -o /usr/local/bin/cpm && sudo chmod 755 /usr/local/bin/cpm
      - name: Install Dependencies
        run: sudo perl /usr/local/bin/cpm install -g --show-build-log-on-failure --no-test --cpanfile cpanfile
      - name: Makefile.PL
        run: perl -I$(pwd) Makefile.PL
      - name: make disttest
        run: make disttest

  perl-versions:
    runs-on: ubuntu-latest
    needs: [ubuntu, disttest]
    name: List Perl versions
    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}
    steps:
      - id: action
        uses: perl-actions/perl-versions@v2
        with:
          since-perl: 5.8
          with-devel: true

  linux:
    name: "Perl ${{ matrix.perl-version }}"
    needs: [perl-versions]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson (needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install cpm
        run: curl -fsSL --compressed https://raw.githubusercontent.com/skaji/cpm/main/cpm -o /usr/local/bin/cpm && chmod 755 /usr/local/bin/cpm
      - name: Install Dependencies
        run: perl /usr/local/bin/cpm install -g --show-build-log-on-failure --no-test --cpanfile cpanfile
      - run: perl Makefile.PL
      - run: make
      - run: make test

  macOS:
    needs: [ubuntu, linux, windows]
    runs-on: macos-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    steps:
      - uses: actions/checkout@v6
      - name: Set up Perl
        run: brew install perl
      - name: perl -V
        run: perl -V
      - name: Install cpm
        run: sudo curl -fsSL --compressed https://raw.githubusercontent.com/skaji/cpm/main/cpm -o /usr/local/bin/cpm && sudo chmod 755 /usr/local/bin/cpm
      - name: Install Dependencies
        run: sudo perl /usr/local/bin/cpm install -g --show-build-log-on-failure --no-test --cpanfile cpanfile
      - run: perl Makefile.PL
      - run: make
      - run: make test

  windows:
    needs: [ubuntu, linux]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Perl
        run: |
          choco install strawberryperl
          echo @"
          C:\strawberry\c\bin
          C:\strawberry\perl\site\bin
          C:\strawberry\perl\bin
          "@ |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: perl -V
        run: perl -V
      - name: Install cpm
        run: curl -fsSL --compressed https://raw.githubusercontent.com/skaji/cpm/main/cpm -o C:\cpm
        shell: bash
      - name: Install Dependencies
        run: perl C:\cpm install -g --show-build-log-on-failure --no-test --cpanfile cpanfile
      - name: perl Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: Run Tests
        run: make test
