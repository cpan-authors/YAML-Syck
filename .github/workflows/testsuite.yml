name: testsuite

on:
  push:
    branches:
      - "*"
    tags-ignore:
      - "*"
  pull_request:

jobs:
  ubuntu:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v2
        with:
          cpanfile: "cpanfile"
      - name: Makefile.PL
        run: perl -I$(pwd) Makefile.PL
      - name: make test
        run: make test

  asan:
    needs: [ubuntu]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v2
        with:
          cpanfile: "cpanfile"
      - name: Install libasan
        run: sudo apt-get update && sudo apt-get install -y libasan8
      - name: Build XS with AddressSanitizer
        run: |
          CF="$(perl -MConfig -e 'print $Config{ccflags}') -fsanitize=address -fno-omit-frame-pointer -g -O0"
          LF="$(perl -MConfig -e 'print $Config{lddlflags}') -fsanitize=address"
          perl -I$(pwd) Makefile.PL CCFLAGS="$CF" LDDLFLAGS="$LF"
          make
      - name: Run test suite under AddressSanitizer
        run: |
          ASAN_LIB=$(gcc -print-file-name=libasan.so)
          ASAN_OPTIONS="detect_leaks=0:verify_asan_link_order=0:halt_on_error=1" \
            LD_PRELOAD="$ASAN_LIB" \
            make test
      - name: Exercise CPANSec CVE triggers under AddressSanitizer
        if: always()
        run: |
          ASAN_LIB=$(gcc -print-file-name=libasan.so)
          inputs=('- &a&V\n&a' '|\n---\n' '[&a\x01\n&a' '--- !!binary \x80\x80\x80\x80')
          rc=0
          for input in "${inputs[@]}"; do
            echo "=== YAML::Syck::Load(\"$input\") ==="
            ASAN_OPTIONS="detect_leaks=0:verify_asan_link_order=0:halt_on_error=1" \
              LD_PRELOAD="$ASAN_LIB" \
              perl -Mblib -MYAML::Syck -e "YAML::Syck::Load(\"$input\")" || rc=1
          done
          exit $rc

  disttest:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v2
        with:
          cpanfile: "cpanfile"
      - name: Makefile.PL
        run: perl -I$(pwd) Makefile.PL
      - name: make disttest
        run: make disttest

  perl-versions:
    runs-on: ubuntu-latest
    needs: [ubuntu, disttest]
    name: List Perl versions
    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}
    steps:
      - id: action
        uses: perl-actions/perl-versions@v2
        with:
          since-perl: 5.8
          with-devel: true

  linux:
    name: "Perl ${{ matrix.perl-version }}"
    needs: [perl-versions]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson (needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v2
        with:
          sudo: false
          cpanfile: "cpanfile"
      - run: perl Makefile.PL
      - run: make
      - run: make test

  macOS:
    needs: [ubuntu, linux, windows]
    runs-on: macos-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    steps:
      - uses: actions/checkout@v6
      - name: Set up Perl
        run: brew install perl
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v2
        with:
          sudo: false
          cpanfile: "cpanfile"
      - run: perl Makefile.PL
      - run: make
      - run: make test

  windows:
    needs: [ubuntu, linux]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Perl
        run: |
          choco install strawberryperl
          echo @"
          C:\strawberry\c\bin
          C:\strawberry\perl\site\bin
          C:\strawberry\perl\bin
          "@ |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v2
        with:
          sudo: false
          cpanfile: "cpanfile"
      - name: perl Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: Run Tests
        run: make test
